name = "fin-dashboard-fetch"
main = "src/index.mjs"
compatibility_date = "2026-07-01"

# No public URL needed — this Worker only runs on a schedule (below) and
# commits straight to GitHub. Skips the workers.dev-subdomain requirement
# that a publicly-routable Worker would need.
workers_dev = false

# Once every 3 days at 05:00 UTC (07:00 SAST). These are slow-moving sovereign
# macro indicators (mostly annual IMF figures), so there is nothing to gain from
# refreshing more often. `*/3` fires on days 1,4,7,...,31; the month boundary can
# make one interval 1-2 days shorter, which is immaterial here.
[triggers]
crons = ["0 5 */3 * *"]
